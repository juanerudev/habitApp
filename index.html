<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hábitos — Matriz</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --accent:#1f7a52;
    --accent-soft:#e4f0e9;
    --accent-ink:#15543a;
    --ink:#1a1a17;
    --ink-2:#55554e;
    --ink-3:#8a8a80;
    --paper:#faf8f4;
    --card:#ffffff;
    --line:#e7e4dc;
    --line-2:#f0ede6;
    --partial:#cf9326;
    --partial-soft:#f6ead0;
    --fail:#c0613f;
    --fail-soft:#f3ddd2;
    --cell:26px;
    --gap:5px;
    --radius:7px;
    --shadow:0 1px 2px rgba(30,28,20,.04), 0 8px 30px -18px rgba(30,28,20,.25);
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{
    font-family:'Hanken Grotesk',system-ui,sans-serif;
    color:var(--ink);
    background:var(--paper);
    -webkit-font-smoothing:antialiased;
    font-feature-settings:"ss01";
  }
  .mono,.num{ font-family:'Space Grotesk',monospace; font-variant-numeric:tabular-nums; }
  h1,h2,h3{ margin:0; font-weight:600; letter-spacing:-.01em; }
  button{ font-family:inherit; cursor:pointer; }
  .compact{ --cell:22px; --gap:4px; }
  ::selection{ background:var(--accent-soft); }

  .wrap{ max-width:1180px; margin:0 auto; padding:28px 32px 90px; }

  /* ---------- top bar ---------- */
  .topbar{ display:flex; align-items:center; gap:20px; flex-wrap:wrap; margin-bottom:26px; }
  .brand{ display:flex; align-items:center; gap:11px; }
  .brand .mark{ width:30px; height:30px; border-radius:9px; background:var(--accent);
    display:flex; align-items:center; justify-content:center; box-shadow:inset 0 0 0 1px rgba(0,0,0,.06); }
  .brand .mark span{ width:10px; height:10px; border-radius:3px; background:#fff; }
  .brand .name{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:19px; letter-spacing:-.02em; }
  .brand .name em{ font-style:normal; color:var(--ink-3); font-weight:500; }
  .topbar .spacer{ flex:1; }

  .goal-seg{ display:inline-flex; background:var(--line-2); border-radius:11px; padding:3px; gap:2px; }
  .goal-seg button{ border:none; background:transparent; color:var(--ink-2); font-size:14px; font-weight:500;
    padding:7px 14px; border-radius:8px; white-space:nowrap; transition:all .15s ease; }
  .goal-seg button:hover{ color:var(--ink); }
  .goal-seg button.on{ background:var(--card); color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,.07); font-weight:600; }
  .goal-seg button.add{ color:var(--ink-3); }

  .month-nav{ display:flex; align-items:center; gap:6px; }
  .month-nav .mlabel{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px; min-width:118px; text-align:center; }
  .nav-ic{ width:32px; height:32px; border-radius:9px; border:1px solid var(--line); background:var(--card);
    color:var(--ink-2); display:flex; align-items:center; justify-content:center; font-size:16px; }
  .nav-ic:hover{ border-color:var(--ink-3); color:var(--ink); }

  /* ---------- stat band ---------- */
  .stat-band{ display:grid; grid-template-columns:1.4fr 1fr 1fr 1fr; gap:14px; margin-bottom:22px; }
  .tile{ background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px 18px; box-shadow:var(--shadow); }
  .tile .cap{ font-size:12.5px; color:var(--ink-3); font-weight:500; letter-spacing:.01em; text-transform:uppercase; }
  .tile .val{ font-family:'Space Grotesk',sans-serif; font-weight:600; line-height:1; margin-top:8px; }
  .tile .val .big{ font-size:34px; }
  .tile .val .unit{ font-size:15px; color:var(--ink-3); font-weight:500; margin-left:4px; }
  .tile.streak{ background:linear-gradient(135deg,var(--accent),var(--accent-ink)); border:none; color:#fff; position:relative; overflow:hidden; }
  .tile.streak .cap{ color:rgba(255,255,255,.78); }
  .tile.streak .val{ color:#fff; display:flex; align-items:baseline; gap:8px; }
  .tile.streak .spark{ position:absolute; right:-8px; bottom:-10px; font-size:96px; line-height:1; opacity:.16; }
  .tile.streak .dots{ display:flex; gap:3px; margin-top:12px; }
  .tile.streak .dots i{ width:7px; height:7px; border-radius:2px; background:rgba(255,255,255,.32); }
  .tile.streak .dots i.f{ background:#fff; }
  .progress-line{ height:5px; border-radius:3px; background:var(--line-2); margin-top:12px; overflow:hidden; }
  .progress-line i{ display:block; height:100%; border-radius:3px; background:var(--accent); }

  /* ---------- today card ---------- */
  .today-card{ background:var(--card); border:1px solid var(--line); border-radius:18px; padding:18px 20px; margin-bottom:22px; box-shadow:var(--shadow); }
  .today-head{ display:flex; align-items:center; gap:12px; margin-bottom:14px; }
  .today-head .dot{ width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 4px var(--accent-soft); }
  .today-head h3{ font-size:16px; }
  .today-head .date{ color:var(--ink-3); font-size:14px; }
  .today-head .count{ margin-left:auto; font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px; color:var(--ink-2); }
  .today-chips{ display:flex; flex-wrap:wrap; gap:10px; }
  .chip{ display:inline-flex; align-items:center; gap:9px; padding:9px 14px 9px 11px; border-radius:12px;
    border:1px solid var(--line); background:var(--paper); font-size:14.5px; font-weight:500; color:var(--ink-2);
    transition:all .14s ease; }
  .chip:hover{ border-color:var(--ink-3); }
  .chip .tick{ width:20px; height:20px; border-radius:6px; border:1.5px solid var(--line); background:#fff;
    display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; transition:all .14s ease; }
  .chip.on{ background:var(--accent-soft); border-color:var(--accent); color:var(--accent-ink); font-weight:600; }
  .chip.on .tick{ background:var(--accent); border-color:var(--accent); }

  /* ---------- matrix ---------- */
  .mx-card{ background:var(--card); border:1px solid var(--line); border-radius:18px; padding:20px 22px 22px; box-shadow:var(--shadow); }
  .mx-top{ display:flex; align-items:baseline; gap:12px; margin-bottom:18px; }
  .mx-top h3{ font-size:16px; }
  .mx-top .hint{ font-size:13.5px; color:var(--ink-3); }
  .mx-top .legend{ margin-left:auto; display:flex; gap:16px; align-items:center; font-size:12.5px; color:var(--ink-3); }
  .mx-top .legend span{ display:inline-flex; align-items:center; gap:6px; }
  .lg{ width:13px; height:13px; border-radius:4px; }
  .lg.done{ background:var(--accent); }
  .lg.miss{ background:#fff; border:1.5px solid var(--line); }
  .lg.partial{ background:var(--partial); }
  .lg.fail{ background:var(--fail); }

  .mx-scroll{ overflow-x:auto; margin:0 -4px; padding:0 4px 4px; }
  table.mx{ border-collapse:separate; border-spacing:var(--gap); }
  table.mx th, table.mx td{ font-weight:400; padding:0; }
  .lbl{ text-align:left; white-space:nowrap; position:sticky; left:0; z-index:2; background:var(--card);
    padding-right:14px; min-width:176px; }
  .colhead{ width:var(--cell); text-align:center; }
  .colhead .dow{ font-size:9.5px; color:var(--ink-3); text-transform:uppercase; line-height:1; margin-bottom:3px; }
  .colhead .dnum{ font-family:'Space Grotesk',sans-serif; font-size:12px; color:var(--ink-2); line-height:1; }
  .colhead.today .dnum{ color:var(--accent); font-weight:700; }
  .colhead.we{ }
  .colhead.weekstart{ }

  .obj-name{ font-size:14.5px; color:var(--ink); font-weight:500; display:flex; align-items:center; gap:7px; }
  .obj-name .edit{ opacity:0; color:var(--ink-3); font-size:12px; transition:opacity .12s; }
  tr:hover .obj-name .edit{ opacity:1; }
  .obj-sub{ font-size:11.5px; color:var(--ink-3); margin-top:1px; }

  .cell{ width:var(--cell); height:var(--cell); border-radius:var(--radius); background:var(--line-2);
    display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform .1s ease, background .14s ease; }
  .cell:hover{ transform:scale(1.16); }
  .cell.done{ background:var(--accent); }
  .cell.miss{ background:#fff; box-shadow:inset 0 0 0 1.5px var(--line); }
  .cell.miss.showfail{ box-shadow:inset 0 0 0 1.5px var(--fail-soft); }
  .cell.miss.showfail::after{ content:""; width:9px; height:1.5px; background:var(--fail); border-radius:2px; opacity:.55; }
  .cell.future{ background:transparent; box-shadow:inset 0 0 0 1.5px var(--line-2); cursor:default; }
  .cell.future:hover{ transform:none; }
  .cell.today-cell{ box-shadow:0 0 0 2px var(--card), 0 0 0 3.5px var(--accent); }
  .col-today-bg{ background:var(--accent-soft); }

  /* summary (día completo) row */
  .sum-cell{ width:var(--cell); height:var(--cell); border-radius:var(--radius); cursor:pointer; transition:transform .1s ease; }
  .sum-cell:hover{ transform:scale(1.16); }
  .sum-cell.done{ background:var(--accent); }
  .sum-cell.partial{ background:var(--partial); }
  .sum-cell.fail{ background:var(--fail); }
  .sum-cell.future{ background:transparent; box-shadow:inset 0 0 0 1.5px var(--line-2); cursor:default; }
  .sum-cell.future:hover{ transform:none; }
  .sumrow td{ padding-bottom:6px; }
  .sumrow .lbl{ font-weight:600; }
  .divider-row td{ height:1px; }
  .divider-row .ln{ height:1px; background:var(--line); margin:5px 0 9px; }

  .pct{ text-align:right; white-space:nowrap; padding-left:16px; min-width:54px; position:sticky; right:0; background:var(--card); }
  .pct .v{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14px; }
  .pct .bar{ height:4px; width:48px; border-radius:2px; background:var(--line-2); margin-top:4px; margin-left:auto; overflow:hidden; }
  .pct .bar i{ display:block; height:100%; background:var(--accent); border-radius:2px; }
  .pct-head{ text-align:right; font-size:11px; color:var(--ink-3); text-transform:uppercase; padding-left:16px; }

  .week-sep{ box-shadow:inset 2px 0 0 -1px var(--line); }

  /* ---------- edición ---------- */
  .name-input{ font-family:'Hanken Grotesk',sans-serif; font-size:14.5px; font-weight:500; color:var(--ink);
    border:none; border-bottom:1.5px solid var(--accent); background:transparent; padding:1px 0; width:165px; outline:none; }
  .obj-name .act{ display:inline-flex; gap:5px; margin-left:5px; opacity:0; transition:opacity .12s; }
  tr:hover .obj-name .act{ opacity:1; }
  .iconbtn{ border:none; background:transparent; color:var(--ink-3); font-size:12.5px; padding:0 2px; cursor:pointer; line-height:1; border-radius:5px; }
  .iconbtn:hover{ color:var(--ink); background:var(--line-2); }
  .iconbtn.del:hover{ color:var(--fail); background:var(--fail-soft); }
  .iconbtn:disabled{ opacity:.25; cursor:default; }
  .iconbtn:disabled:hover{ background:transparent; color:var(--ink-3); }
  .add-obj{ display:inline-flex; align-items:center; gap:7px; color:var(--ink-3); font-size:13.5px; font-weight:500;
    border:none; background:transparent; padding:10px 2px 2px; cursor:pointer; }
  .add-obj:hover{ color:var(--accent); }
  .cell.untracked{ background:transparent; cursor:default; }
  .cell.untracked::after{ content:""; width:3px; height:3px; border-radius:50%; background:var(--line); }
  .cell.untracked:hover{ transform:none; }
  .goal-seg .ren{ font-family:'Hanken Grotesk'; font-size:14px; font-weight:600; border:none; border-bottom:1.5px solid var(--accent);
    background:transparent; outline:none; width:120px; color:var(--ink); padding:7px 4px; }
  .ren-wrap{ display:inline-flex; align-items:center; gap:6px; background:var(--card); border-radius:8px; padding:0 6px;
    box-shadow:0 1px 2px rgba(0,0,0,.07); }
  .ren-del{ border:none; background:transparent; color:var(--fail); font-family:'Hanken Grotesk'; font-size:12.5px; font-weight:600;
    cursor:pointer; padding:5px 8px; border-radius:7px; white-space:nowrap; }
  .ren-del:hover{ background:var(--fail-soft); }
  .empty-objs{ color:var(--ink-3); font-size:14.5px; padding:14px 2px 4px; }
  .chip.ghost{ border-style:dashed; color:var(--ink-3); background:transparent; }
  .chip.ghost:hover{ border-color:var(--accent); color:var(--accent); }

  /* ---------- reordenar ---------- */
  .grip{ cursor:grab; color:var(--line); font-size:13px; line-height:1; margin-right:2px; letter-spacing:-2px;
    opacity:0; transition:opacity .12s, color .12s; user-select:none; }
  tr:hover .grip{ opacity:1; }
  .grip:hover{ color:var(--ink-3); }
  .grip:active{ cursor:grabbing; }
  tr.row-dragging td{ opacity:.35; }
  tr.row-over td{ box-shadow:inset 0 2.5px 0 var(--accent); }

  /* ===================== RESPONSIVE ===================== */
  /* En dispositivos táctiles no hay hover: mostramos siempre los controles */
  @media (hover: none){
    .grip, .obj-name .act, .obj-name .edit{ opacity:1; }
  }

  /* Tablet y por debajo */
  @media (max-width: 880px){
    .wrap{ padding:20px 18px 80px; }
    .stat-band{ grid-template-columns:1fr 1fr; }
    .tile.streak{ grid-column:1 / -1; }
    .mx-top{ flex-wrap:wrap; }
    .mx-top .legend{ margin-left:0; width:100%; flex-wrap:wrap; gap:12px; }
  }

  /* Móvil */
  @media (max-width: 600px){
    .wrap{ padding:16px 13px 72px; }

    /* barra superior: marca + mes en una fila, metas debajo y deslizables */
    .topbar{ gap:12px; margin-bottom:18px; }
    .brand{ order:1; }
    .topbar .spacer{ display:none; }
    .month-nav{ order:2; margin-left:auto; }
    .goal-seg{ order:3; width:100%; display:flex; flex-wrap:nowrap; overflow-x:auto;
      -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .goal-seg::-webkit-scrollbar{ display:none; }
    .goal-seg button{ flex:0 0 auto; }
    .nav-ic{ width:36px; height:36px; }
    .month-nav .mlabel{ min-width:96px; font-size:14px; }

    /* estadísticas más compactas */
    .tile{ padding:13px 14px; border-radius:14px; }
    .tile .val .big{ font-size:28px; }

    /* tarjeta de hoy */
    .today-card{ padding:15px 15px; border-radius:15px; }
    .today-head{ flex-wrap:wrap; gap:8px 10px; }
    .today-head .count{ font-size:14px; }
    .today-chips{ gap:8px; }
    .chip{ font-size:14px; padding:10px 13px 10px 11px; }

    /* matriz: etiqueta más estrecha, controles visibles, % sin barra */
    .mx-card{ padding:16px 14px 18px; border-radius:15px; }
    .lbl{ min-width:128px; max-width:46vw; padding-right:10px; }
    .obj-name{ font-size:13.5px; }
    .grip{ opacity:1; }
    .obj-name .act{ opacity:1; }
    .pct{ padding-left:10px; min-width:38px; }
    .pct .bar{ display:none; }
    .pct-head{ padding-left:10px; }
  }

  @media (prefers-reduced-motion: no-preference){
    .reveal{ animation:rise .45s cubic-bezier(.2,.7,.2,1) both; }
  }
  @keyframes rise{ from{ transform:translateY(8px); } to{ transform:none; } }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="habitos-app.jsx"></script>
</body>
</html>
